# XcodeGen 规格（可选）。已提交的 YunApp.xcodeproj 可直接打开；
# 若团队偏好用 XcodeGen 统一生成、避免 pbxproj 合并冲突，可执行：
#   brew install xcodegen && cd YunApp && xcodegen generate
name: YunApp
options:
  bundleIdPrefix: com.yun53
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
packages:
  DesignSystem: { path: ../Packages/DesignSystem }
  Engine: { path: ../Packages/Engine }
  Mixing: { path: ../Packages/Mixing }
  Recipes: { path: ../Packages/Recipes }
  ShareCard: { path: ../Packages/ShareCard }
  DeepLink: { path: ../Packages/DeepLink }
  Health: { path: ../Packages/Health }
  Cellar: { path: ../Packages/Cellar }
  Authenticity: { path: ../Packages/Authenticity }
  AICompanion: { path: ../Packages/AICompanion }
targets:
  YunApp:
    type: application
    platform: iOS
    sources:
      - path: YunApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yun53.weixundu
        INFOPLIST_FILE: YunApp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: YunApp/Resources/YunApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
    dependencies:
      - package: DesignSystem
      - package: Engine
      - package: Mixing
      - package: Recipes
      - package: ShareCard
      - package: DeepLink
      - package: Health
      - package: Cellar
      - package: Authenticity
      - package: AICompanion
